name: Update Rental Data

on:
  schedule:
    # 每月 2、12、22 日 01:00 UTC（台灣 09:00）
    # 配合實價登錄每月 1/11/21 日更新，隔天抓取最新資料
    - cron: '0 1 2,12,22 * *'
  workflow_dispatch:
    inputs:
      skip_591:
        description: '跳過 591 爬蟲'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache raw ZIP files
        uses: actions/cache@v4
        with:
          path: data-pipeline/raw
          key: rental-raw-${{ hashFiles('data-pipeline/01_download_and_process.py') }}
          restore-keys: |
            rental-raw-

      - name: Install Python dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      # === 實價登錄 ETL ===
      - name: Run main ETL pipeline (實價登錄)
        run: python data-pipeline/01_download_and_process.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Run supplementary data generation
        run: python data-pipeline/02_generate_supplementary.py
        env:
          PYTHONIOENCODING: utf-8

      # === 591 爬蟲（可選跳過）===
      - name: Crawl 591 rental listings
        if: ${{ !inputs.skip_591 }}
        run: python data-pipeline/03_crawl_591.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      # === 提交更新 ===
      - name: Check for data changes
        id: check_changes
        run: |
          git add public/data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected!"
            git diff --cached --stat
          fi

      - name: Commit and push updated data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update rental data (auto-scheduled)

          Automated data refresh from 內政部實價登錄 + 591 爬蟲
          $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
